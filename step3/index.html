<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Your Code — Fake Ninja</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#060608;--card:#0d0d12;--border:#1a1a24;--accent:#00e5ff;--green:#00ff88;--warn:#ffbb00;--red:#ff3355;--text:#c8cdd8;--dim:#454a58}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;max-width:420px;width:100%;display:flex;flex-direction:column;gap:16px}
  .header{text-align:center}
  .logo{font-size:22px;font-weight:700;letter-spacing:5px;color:#fff}.logo span{color:var(--accent)}
  .sub{font-size:9px;color:var(--dim);letter-spacing:3px;margin-top:4px}
  /* Duration buttons */
  .dur-label{font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--dim);text-align:center;letter-spacing:2px}
  .btn-row{display:flex;gap:8px}
  .btn{flex:1;padding:13px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;border:1px solid;transition:all .18s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
  .btn-3h{border-color:var(--warn);color:var(--warn);background:transparent}.btn-3h:hover{background:rgba(255,187,0,.07)}
  .btn-3h.active,.btn-3h:disabled{background:rgba(255,187,0,.12);pointer-events:none;opacity:.5}
  .btn-6h{border-color:var(--accent);color:var(--accent);background:transparent}.btn-6h:hover{background:rgba(0,229,255,.07)}
  .btn-6h.active,.btn-6h:disabled{background:rgba(0,229,255,.12);pointer-events:none;opacity:.5}
  /* Code box */
  .code-section{display:none;flex-direction:column;gap:10px;text-align:center}
  .code-section.show{display:flex}
  .code-label{font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--dim);letter-spacing:2px}
  .code-box{font-size:34px;font-weight:700;letter-spacing:8px;font-family:'Share Tech Mono',monospace;color:var(--accent);background:#000;border:1px solid var(--accent);border-radius:8px;padding:18px 12px}
  .expire-bar-wrap{background:#1a1a24;border-radius:4px;height:3px;overflow:hidden}
  .expire-bar{height:100%;background:var(--green);border-radius:4px;transition:width 1s linear;width:100%}
  .expire-text{font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--dim)}
  .btn-copy{background:var(--green);color:#000;border:none;border-radius:6px;padding:13px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .18s;width:100%}
  .btn-copy:hover{filter:brightness(1.1)}.btn-copy.copied{background:var(--accent);pointer-events:none}
  .countdown-txt{font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--dim);text-align:center}
  /* Loading */
  .loading{display:none;flex-direction:column;align-items:center;gap:10px;padding:16px 0}
  .loading.show{display:flex}
  .spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-txt{font-size:12px;font-family:'Share Tech Mono',monospace;color:var(--dim);letter-spacing:2px}
  /* Expired / error */
  .expired-msg{display:none;text-align:center;color:var(--red);font-size:13px;font-family:'Share Tech Mono',monospace}
  .err-msg{font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--red);text-align:center;min-height:14px}
  /* Divider */
  .divider{display:flex;align-items:center;gap:8px}
  .divider-line{flex:1;height:1px;background:var(--border)}
  .divider-txt{font-size:9px;color:var(--dim);letter-spacing:2px;font-family:'Share Tech Mono',monospace;white-space:nowrap}
  /* Code input */
  .code-input-wrap{display:flex;gap:8px}
  .code-input{flex:1;background:#000;border:1px solid var(--border);border-radius:6px;padding:11px 12px;font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--accent);letter-spacing:3px;text-align:center;text-transform:uppercase;outline:none;transition:border-color .18s}
  .code-input::placeholder{color:var(--dim);letter-spacing:1px;text-transform:none;font-size:12px}
  .code-input:focus{border-color:var(--accent)}.code-input.error{border-color:var(--red)}
  .btn-redeem{background:transparent;border:1px solid var(--green);color:var(--green);border-radius:6px;padding:11px 16px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .18s;white-space:nowrap}
  .btn-redeem:hover{background:rgba(0,255,136,.07)}.btn-redeem:disabled{opacity:.4;pointer-events:none}
  .redeem-status{font-size:11px;font-family:'Share Tech Mono',monospace;text-align:center;min-height:14px}
  .footer{text-align:center;font-size:9px;color:#1e1e24;letter-spacing:1px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">FAKE <span>NINJA</span></div>
    <div class="sub">STEP — GET YOUR SHORT CODE</div>
  </div>

  <!-- Duration buttons -->
  <div>
    <div class="dur-label" style="margin-bottom:8px">CHOOSE DURATION TO GET CODE</div>
    <div class="btn-row">
      <button class="btn btn-3h" id="btn3" onclick="generateCode(3)">3 HOURS<br><span style="font-size:10px;opacity:.7">6-CHAR CODE</span></button>
      <button class="btn btn-6h" id="btn6" onclick="generateCode(6)">6 HOURS<br><span style="font-size:10px;opacity:.7">9-CHAR CODE</span></button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spin"></div>
    <div class="loading-txt">GENERATING CODE...</div>
  </div>

  <!-- Code display -->
  <div class="code-section" id="code-section">
    <div class="code-label">YOUR SHORT CODE (9 CHARS · EXPIRES IN 5 MIN)</div>
    <div class="code-box" id="code-box">------</div>
    <div class="expire-bar-wrap"><div class="expire-bar" id="expire-bar"></div></div>
    <div class="expire-text" id="expire-text">Expires in 5:00</div>
    <button class="btn-copy" id="btn-copy" onclick="copyCode()">📋 COPY CODE</button>
    <div class="countdown-txt" id="countdown-txt">Auto redirect to Get Key in <span id="countdown">30</span>s</div>
  </div>

  <div class="err-msg" id="err-msg"></div>
  <div class="expired-msg" id="expired-msg">⏱ Code expired. <a href="javascript:location.reload()" style="color:var(--red)">Generate new</a></div>

  <!-- Divider + input code -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-txt">ALREADY HAVE A CODE?</div>
    <div class="divider-line"></div>
  </div>
  <div class="code-input-wrap">
    <input class="code-input" id="code-input" type="text" maxlength="9" placeholder="Paste code here" autocomplete="off" spellcheck="false" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"/>
    <button class="btn-redeem" id="btn-redeem" onclick="goRedeem()">GET KEY</button>
  </div>
  <div class="redeem-status" id="redeem-status"></div>

  <div class="footer">t.me/fakelagreborn</div>
</div>

<script>
(function(){
  var _=function(c){return c.split(",").map(Number).map(function(x){return String.fromCharCode(x)}).join("")};
  var GETKEY_URL  = _("104,116,116,112,115,58,47,47,90,111,120,117,52,75,46,103,105,116,104,117,98,46,105,111,47,70,78,71,101,116,75,101,121,63,108,97,110,100,101,100,61,49");
  var SERVER_URL  = _("104,116,116,112,115,58,47,47,102,110,45,107,101,121,45,115,101,114,118,101,114,46,118,101,114,99,101,108,46,97,112,112,47,97,112,105,47,107,101,121");
  var CODE_TTL_MS = 5*60*1000, AUTO_REDIR_S = 30;
  var code=null, endMs=null, expired=false, autoSec=AUTO_REDIR_S;
  var expInt=null, autoInt=null;

  // Fingerprint dari localStorage (sama persis dengan getkey page)
  function getFingerprint() {
    var stored = localStorage.getItem('fn_fp');
    if (stored && stored.startsWith('FP')) return stored;
    var raw = [
      navigator.language||'',
      navigator.hardwareConcurrency||0,
      screen.width+'x'+screen.height,
      screen.colorDepth||0,
      new Date().getTimezoneOffset()
    ].join('|');
    var h=0;
    for(var i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0;}
    var rand=Math.random().toString(36).substring(2,8).toUpperCase();
    var fp='FP'+Math.abs(h).toString(16).toUpperCase().padStart(8,'0')+rand;
    localStorage.setItem('fn_fp',fp);
    return fp;
  }
  var FP = getFingerprint();

  function show(id)  { document.getElementById(id).classList.add('show'); }
  function hide(id)  { document.getElementById(id).classList.remove('show'); }
  function setErr(msg) { document.getElementById('err-msg').textContent = msg||''; }

  window.generateCode = function(hours) {
    document.getElementById('btn3').disabled = true;
    document.getElementById('btn6').disabled = true;
    setErr('');
    show('loading');

    fetch(SERVER_URL+'?action=gen_code', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Accept':'application/json, text/plain, */*',
        'Accept-Language':'id-ID,id;q=0.9,en-US;q=0.8',
        'Cache-Control':'no-cache'
      },
      body: JSON.stringify({hours:hours, ts:Date.now(), fp:FP})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      hide('loading');
      if(!data.ok||!data.code){
        document.getElementById('btn3').disabled=false;
        document.getElementById('btn6').disabled=false;
        setErr(data.error==='rate_limited'?'Too many attempts. Please wait.':'Failed to generate code. Reload and try again.');
        return;
      }
      code = data.code;
      endMs = Date.now() + CODE_TTL_MS;
      document.getElementById('code-box').textContent = code;
      show('code-section');

      // Expire countdown
      function updateExpire(){
        if(!endMs) return;
        var rem = endMs - Date.now();
        var bar = document.getElementById('expire-bar');
        var txt = document.getElementById('expire-text');
        if(rem<=0){
          bar.style.width='0%';
          txt.textContent='Code expired!';
          txt.style.color='var(--red)';
          document.getElementById('code-box').style.color='var(--dim)';
          document.getElementById('btn-copy').style.display='none';
          document.getElementById('countdown-txt').style.display='none';
          document.getElementById('expired-msg').style.display='block';
          clearInterval(expInt); clearInterval(autoInt);
          expired=true; return;
        }
        bar.style.width=(rem/CODE_TTL_MS*100)+'%';
        bar.style.background = rem < 60000 ? 'var(--red)' : rem < 120000 ? 'var(--warn)' : 'var(--green)';
        var m=Math.floor(rem/60000), s=Math.floor((rem%60000)/1000);
        txt.textContent='Expires in '+m+':'+(s<10?'0':'')+s;
      }
      updateExpire();
      expInt = setInterval(updateExpire, 1000);

      // Auto redirect countdown
      var cdEl = document.getElementById('countdown');
      autoInt = setInterval(function(){
        if(expired){ clearInterval(autoInt); return; }
        autoSec--; cdEl.textContent=autoSec;
        if(autoSec<=0){ clearInterval(autoInt); window.location.replace(GETKEY_URL); }
      },1000);
    })
    .catch(function(){
      hide('loading');
      document.getElementById('btn3').disabled=false;
      document.getElementById('btn6').disabled=false;
      setErr('Connection error. Check your internet.');
    });
  };

  window.copyCode = function(){
    if(expired||!code) return;
    try{
      if(navigator.clipboard){ navigator.clipboard.writeText(code).catch(function(){}); }
      else{
        var t=document.createElement('textarea');
        t.value=code; document.body.appendChild(t); t.select();
        document.execCommand('copy'); document.body.removeChild(t);
      }
    }catch(e){}
    var btn=document.getElementById('btn-copy');
    btn.textContent='✅ COPIED! Going to Get Key...';
    btn.classList.add('copied');
    document.getElementById('countdown-txt').style.display='none';
    clearInterval(autoInt);
    setTimeout(function(){ window.location.replace(GETKEY_URL); }, 1200);
  };

  window.goRedeem = function(){
    var input = document.getElementById('code-input');
    var statusEl = document.getElementById('redeem-status');
    var btnR = document.getElementById('btn-redeem');
    var c = (input.value||'').trim().toUpperCase();
    if(c.length<6){
      input.classList.add('error');
      statusEl.style.color='var(--red)';
      statusEl.textContent='Code too short.';
      return;
    }
    input.classList.remove('error');
    statusEl.style.color='var(--dim)';
    statusEl.textContent='Verifying...';
    btnR.disabled=true;

    fetch(SERVER_URL+'?action=redeem_code',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept-Language':'id-ID,id;q=0.9'},
      body:JSON.stringify({code:c,fp:FP})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok){
        input.classList.add('error');
        statusEl.style.color='var(--red)';
        var em={code_not_found:'Code not found or expired.',code_already_used:'Code already used.',cooldown_active:'On cooldown. Wait before redeeming.',rate_limited:'Too many attempts.'};
        statusEl.textContent=em[data.error]||('Error: '+data.error);
        btnR.disabled=false; return;
      }
      // Simpan session di localStorage lalu redirect ke getkey
      try{
        localStorage.setItem('fn_active_session',JSON.stringify({key:data.key,expiryMs:data.expiryMs,fp:FP}));
        localStorage.removeItem('fn_cooldown');
      }catch(e){}
      statusEl.style.color='var(--green)';
      statusEl.textContent='✅ Key ready! Redirecting...';
      clearInterval(autoInt);
      setTimeout(function(){ window.location.replace(GETKEY_URL); },1000);
    })
    .catch(function(){
      statusEl.style.color='var(--red)';
      statusEl.textContent='Connection error.';
      btnR.disabled=false;
    });
  };
})();
</script>
</body>
</html>
